name: Build Container
run-name: Build Container

on:
  workflow_dispatch:
  workflow_call:
  repository_dispatch:
    types: [update_detected]

jobs:
  Get-Latest-Resonite-Package:
    runs-on: ubuntu-latest
    outputs:
      cachekey: ${{ runner.os }}-resonite-genuine-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          docker-images: false
          dotnet: false
          large-packages: false
      - name: Download and install Resonite
        run: >
          mkdir -p steamdata &&
          docker run --mount type=bind,source="$(pwd)/steamdata",target="$(pwd)/steamdata" docker.io/steamcmd/steamcmd:ubuntu-24 --
          steamcmd
          +force_install_dir "$(pwd)/steamdata/"
          +login ${{ secrets.STEAM_USERNAME }} ${{ secrets.STEAM_PASSWORD }}
          +app_update 2519830 -beta headless -betapassword ${{ secrets.HEADLESS_CODE }} validate
          +quit
          || true
      - name: Cache Resonite binary
        id: cache-resonite
        uses: actions/cache/save@v5
        with:
          path: ./steamdata
          key: ${{ runner.os }}-resonite-genuine-${{ github.run_id }}-${{ github.run_attempt }}

  Check-Latest-BuildID:
    runs-on: ubuntu-slim
    outputs:
      build-id: ${{ steps.buildid.outputs.buildid }}
      timeupdated: ${{ steps.buildid.outputs.timeupdated }}
    steps:
      - name: Get build ID of headless on Steam
        id: buildid
        run: >
          curl -X GET 'https://api.steamcmd.net/v1/info/2519830' |
          yq -P -o shell '.data.2519830.depots.branches.release' >>
          "${GITHUB_OUTPUT}"

  Get-Resonite-Version:
    needs:
      - Get-Latest-Resonite-Package
    runs-on: ubuntu-slim
    outputs:
      version: ${{ steps.cver.outputs.version }}
      buildid: ${{ steps.buildid.outputs.buildid }}
    steps:
      - name: Cache Resonite binary
        id: cache-resonite
        uses: actions/cache/restore@v5
        with:
          path: ./steamdata
          key: ${{ needs.Get-Latest-Resonite-Package.outputs.cachekey }}
      - name: Get chronical version on Resonite
        id: cver
        run: echo "version=$(cat ./steamdata/Build.version)" >> "${GITHUB_OUTPUT}"
      - name: Get build ID on Steam
        id: buildid
        run: >
          echo "buildid=$(cat ./steamdata/steamapps/appmanifest_2519830.acf |
          perl -nlE 'if ($_ =~ /buildid/) { $_ =~ s/\s*"buildid"\s*\"(\d+)\"\s*/$1/; print $_; }' | head -n 1)" >>
          "${GITHUB_OUTPUT}"

  Get-Crystite-Version:
    runs-on: ubuntu-slim
    outputs:
      commit-hash: ${{ steps.commit-hash.outputs.longhash }}
    steps:
      - name: Checkout Crystite Repository
        uses: actions/checkout@v6
        with:
          repository: Nihlus/Crystite
      - name: Extract commit hash
        id: commit-hash
        working-directory: Crystite
        run: |
          echo "longhash=$(git show --format='%H' --no-patch)" >> "${GITHUB_OUTPUT}"
          echo "shorthash=$(git show --format='%h' --no-patch)" >> "${GITHUB_OUTPUT}"

  Build-Resonite-Container:
    needs:
      - Get-Latest-Resonite-Package
      - Get-Resonite-Version
      - Get-Crystite-Version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        variant: [vanilla, flavored]
    steps:
      - name: Check out repository code
        uses: actions/checkout@v6
      - name: Setup buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to the container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata for the Docker image
        id: extmeta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          flavor: |
            latest=true
            prefix=${{ matrix.variant }}-,onlatest=true
          tags: |
            type=raw,value=${{ needs.Get-Resonite-Version.outputs.buildid }}
            type=raw,value=${{ needs.Get-Resonite-Version.outputs.version }}
          labels: |
            org.opencontainers.image.title=Resonite Container
            net.nemnomi.resonite-container.steam-buildid=${{ needs.Get-Resonite-Version.outputs.buildid }}
            net.nemnomi.resonite-container.resonite-version=${{ needs.Get-Resonite-Version.outputs.version }}
            ${{ matrix.variant == 'crystite' && format('net.nemnomi.resonite-container.crystite-commit={0}', needs.Get-Crystite-Version.outputs.commit-hash) }}
          annotations: |
            org.opencontainers.image.title=Resonite Container
            net.nemnomi.resonite-container.steam-buildid=${{ needs.Get-Resonite-Version.outputs.buildid }}
            net.nemnomi.resonite-container.resonite-version=${{ needs.Get-Resonite-Version.outputs.version }}
            ${{ matrix.variant == 'crystite' && format('net.nemnomi.resonite-container.crystite-commit={0}', needs.Get-Crystite-Version.outputs.commit-hash) }}
      - name: Cache Resonite binary
        id: cache-resonite
        uses: actions/cache/restore@v5
        with:
          path: ./steamdata
          key: ${{ needs.Get-Latest-Resonite-Package.outputs.cachekey }}
      - name: Free disk space
        uses: jlumbroso/free-disk-space@v1.3.1
      - name: Build images for testing
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.variant }}
          load: true
          tags: test-${{ matrix.variant }}
          labels: ${{ steps.extmeta.outputs.labels }}
          annotations: ${{ steps.extmeta.outputs.annotations }}
          no-cache: true
          secrets: |
            STEAM_USERNAME=${{ secrets.STEAM_USERNAME }}
            STEAM_PASSWORD=${{ secrets.STEAM_PASSWORD }}
            HEADLESS_CODE=${{ secrets.HEADLESS_CODE }}
      - name: Basic test
        run: |
          docker run --rm --env RESONITE_HEADLESS_CODE=${{ secrets.HEADLESS_CODE }} test-${{ matrix.variant }}
      - name: Build and push images
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.variant }}
          push: true
          tags: ${{ steps.extmeta.outputs.tags }}
          labels: ${{ steps.extmeta.outputs.labels }}
          annotations: ${{ steps.extmeta.outputs.annotations }}
          provenance: false # avoid bug of github https://github.com/orgs/community/discussions/45969
          no-cache: true
          secrets: |
            STEAM_USERNAME=${{ secrets.STEAM_USERNAME }}
            STEAM_PASSWORD=${{ secrets.STEAM_PASSWORD }}
            HEADLESS_CODE=${{ secrets.HEADLESS_CODE }}

  Notify-Discord:
    needs:
      - Get-Resonite-Version
      - Build-Resonite-Container
    if: always()
    runs-on: ubuntu-slim
    env:
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
    steps:
      - name: Notify Discord on success
        if: needs.Build-Resonite-Container.result == 'success' && env.DISCORD_WEBHOOK_URL != ''
        run: |
          curl -fsSL -X POST "${DISCORD_WEBHOOK_URL}" \
            -H 'Content-Type: application/json' \
            -d @- <<'PAYLOAD'
          {
            "embeds": [{
              "title": "Container Build Succeeded",
              "description": "All container image variants have been built and pushed successfully.",
              "color": 3066993,
              "fields": [
                {
                  "name": "Resonite Version",
                  "value": "`${{ needs.Get-Resonite-Version.outputs.version }}`",
                  "inline": true
                },
                {
                  "name": "Steam Build ID",
                  "value": "`${{ needs.Get-Resonite-Version.outputs.buildid }}`",
                  "inline": true
                },
                {
                  "name": "Workflow Run",
                  "value": "[View Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
                }
              ]
            }]
          }
          PAYLOAD
      - name: Notify Discord on failure
        if: needs.Build-Resonite-Container.result == 'failure' && env.DISCORD_WEBHOOK_URL != ''
        run: |
          curl -fsSL -X POST "${DISCORD_WEBHOOK_URL}" \
            -H 'Content-Type: application/json' \
            -d @- <<'PAYLOAD'
          {
            "embeds": [{
              "title": "Container Build Failed",
              "description": "One or more container image variants failed to build.",
              "color": 15158332,
              "fields": [
                {
                  "name": "Resonite Version",
                  "value": "`${{ needs.Get-Resonite-Version.outputs.version }}`",
                  "inline": true
                },
                {
                  "name": "Steam Build ID",
                  "value": "`${{ needs.Get-Resonite-Version.outputs.buildid }}`",
                  "inline": true
                },
                {
                  "name": "Workflow Run",
                  "value": "[View Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
                }
              ]
            }]
          }
          PAYLOAD
